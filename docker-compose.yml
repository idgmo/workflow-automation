version: '3.8'

services:
  # =======================================================
  # SIMULATED CLIENT 1: Alpine Property Management
  # =======================================================
  alpine_rental_pipeline:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mock_client_alpine_prod
    restart: always
    networks:
      - alpine_isolated_net
    volumes:
      - /var/lib/automation_data/client_alpine:/root/localDatabase
    environment:
      - STRIPE_SECRET_KEY=${ALPINE_STRIPE_SECRET_KEY}
      - DISCORD_WEBHOOK_URL=${ALPINE_DISCORD_WEBHOOK_URL}
      - CLIENT_NAME=ALPINE PROPERTY MANAGEMENT
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

  # =======================================================
  # SIMULATED CLIENT 2: Apex Commercial Distributors
  # =======================================================
  apex_wholesale_pipeline:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mock_client_apex_prod
    restart: always
    networks:
      - apex_isolated_net
    volumes:
      - /var/lib/automation_data/client_apex:/root/localDatabase
    environment:
      - STRIPE_SECRET_KEY=${APEX_STRIPE_SECRET_KEY}
      - DISCORD_WEBHOOK_URL=${APEX_DISCORD_WEBHOOK_URL}
      - CLIENT_NAME=APEX COMMERCIAL DISTRIBUTORS
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

networks:
  alpine_isolated_net:
    driver: bridge
  apex_isolated_net:
    driver: bridge
